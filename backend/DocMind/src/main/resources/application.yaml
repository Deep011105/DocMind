spring:
  application:
    name: DocMind

  task:
    execution:
      pool:
        core-size: 4
        max-size: 8
        queue-capacity: 100

  datasource:
    url: jdbc:postgresql://192.168.0.104:5433/docmind
    username: docmind
    password: docmind
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
#        format_sql: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  ai:
    ollama:
      base-url: http://localhost:11434

      chat:
        model: llama3.2:3b
        options:
          temperature: 0.1

      embedding:
        model: nomic-embed-text

    vectorstore:
      pgvector:
        initialize-schema: true
        dimensions: 768
        index-type: HNSW
        distance-type: COSINE_DISTANCE

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    expiration-ms: 86400000

  rag:
    chunk-size: 1024
    top-k: 5
    similarity-threshold: 0.7

logging:
  level:
    root: INFO
    com.docmind: DEBUG
    org.springframework.ai: INFO
    org.hibernate.SQL: DEBUG